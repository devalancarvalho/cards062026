    border: 1.5px solid #ffffff44;

    color: #fff;
    letter-spacing: -.5px;
  }
  .header-title {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .01em;
  }
  .header-sub {
    color: #93c5fd;

    font-weight: 400;

  .header-meta {

  }

    width: 1px; height: 28px;

    align-items: center;
    justify-content: space-between;
    gap: 2rem;

    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .hero-title span {
    color: var(--accent);
  }
  .hero-desc {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 4px;
  }
  .summary-pills {
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
  }
  .pill {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .03em;

  .pill-ind   { background: var(--tag-ind-bg);   color: var(--tag-ind-text); }
  .pill-var   { background: var(--tag-var-bg);   color: var(--tag-var-text); }
  .pill-trib  { background: var(--tag-trib-bg);  color: var(--tag-trib-text); }

    font-weight: 700;
    color: var(--text-primary);

  .section-count {

    margin-left: auto;
  }
  .section-rule {
    flex: 1;
    height: 1px;
    background: var(--border);

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1.25rem;

  .client-card {
    background: var(--card-bg);

</head>

gestoes.forEach(g => {
  const cfg = gestaoColors[g] || {};
  const count = raw.filter(r=>r.gestao===g).length;
  const p = document.createElement('span');
  p.className = 'pill ' + (cfg.pill||'');
  p.textContent = `${g} (${count})`;
  pillsEl.appendChild(p);
});

// date
const now = new Date();
document.getElementById('gen-date').textContent = now.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

// build content
const main = document.getElementById('main-content');

gestoes.forEach(gestao => {
  const cfg = gestaoColors[gestao] || {};
  const clients = byGestao[gestao];
  const gestaoCount = raw.filter(r=>r.gestao===gestao).length;

  const section = document.createElement('div');
  section.className = 'section-block';

  section.innerHTML = `
    <div class="section-header">
      <span class="section-tag" style="background:${cfg.bg};color:${cfg.color}">${cfg.tag||gestao}</span>
      <span class="section-name">${gestao}</span>
      <span class="section-rule"></span>
      <span class="section-count">${gestaoCount} chamado${gestaoCount!==1?'s':''}</span>
    </div>
    <div class="client-grid" id="grid-${gestao.replace(/\s/g,'')}"></div>
  `;
  main.appendChild(section);

  const grid = section.querySelector('.client-grid');

  // sort clients by number of items desc
  const sortedClients = Object.entries(clients).sort((a,b)=>b[1].length-a[1].length);

  sortedClients.forEach(([cliente, items]) => {
    const modulos = [...new Set(items.map(i=>i.modulo))].join(', ');
    const card = document.createElement('div');
    card.className = 'client-card';

    const headerHtml = `
      <div class="client-card-header">
        <div class="client-avatar">${initials(cliente)}</div>
        <div>
          <div class="client-name">${fmtCliente(cliente)}</div>
          <div class="client-modulo">${modulos}</div>
        </div>
        <div class="client-card-badge">${items.length}</div>
      </div>
    `;

    const itemsHtml = items.map(item => `
      <div class="item-row">
        <div class="item-chamado">#${item.chamado}</div>
        <div class="item-body">
          <div class="item-title">${item.titulo}</div>
          <div class="item-meta">
            <span class="item-modulo">${item.modulo}</span>
            <span class="item-dot"></span>
            <span class="item-date">${item.data}</span>
          </div>
        </div>
        <div class="item-id">${item.id}</div>
      </div>
    `).join('');

    card.innerHTML = headerHtml + `<div class="item-list">${itemsHtml}</div>`;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
